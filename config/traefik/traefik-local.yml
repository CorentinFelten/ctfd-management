# Traefik Static Configuration — Local / Development
# Self-signed TLS on :443 so Galvanize-generated https:// URLs work.
# No ACME / Let's Encrypt — Traefik auto-generates a default certificate.

accessLog:
  addInternals: true

log:
  level: DEBUG

api:
  insecure: true
  dashboard: true

# ──────────────────────────────────────────────
# Providers
# ──────────────────────────────────────────────

providers:
  docker:
    exposedByDefault: false
    endpoint: "unix:///var/run/docker.sock"
    network: ctfd_infra_proxy
  file:
    filename: /etc/traefik/config.yml
    watch: true

# ──────────────────────────────────────────────
# Entrypoints
# ──────────────────────────────────────────────

entryPoints:
  web:
    address: ":80"
    asDefault: true

  websecure:
    address: ":443"
    asDefault: true
    http:
      tls: {}

  instancer:
    address: ":8080"

  traefik:
    address: ":9090"